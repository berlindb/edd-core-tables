name: Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:
  # Fired by berlindb/core on push to master (the cross-repo canary).
  repository_dispatch:
    types: [ core-updated ]

jobs:
  resolve:
    name: Resolve EDD stable tag
    runs-on: ubuntu-latest
    outputs:
      stable: ${{ steps.pick.outputs.stable }}
    steps:
      - id: pick
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STABLE=$(gh api repos/easydigitaldownloads/easy-digital-downloads/releases/latest --jq .tag_name)
          echo "stable=$STABLE" >> "$GITHUB_OUTPUT"
          echo "Latest EDD stable release: $STABLE"

  phpunit:
    name: PHP ${{ matrix.php }} / EDD ${{ matrix.edd }}
    runs-on: ubuntu-latest
    needs: resolve
    # The EDD stable release is the authoritative parity gate. EDD's `main` branch is
    # its 3.x development line (an early-warning signal for upcoming schema changes) -
    # it can legitimately introduce a schema core cannot yet express, so keep it
    # informational rather than blocking. (The repo's `master` branch is a stale,
    # pre-3.x legacy line with no src/ - do NOT use it.)
    continue-on-error: ${{ matrix.edd == 'main' }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.3' ]
        edd: [ 'stable', 'main' ]

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Checkout berlindb/core
        uses: actions/checkout@v6
        with:
          repository: berlindb/core
          # The exact core commit when fired by the canary (repository_dispatch),
          # else master for normal push / PR / manual runs.
          ref: ${{ github.event.client_payload.sha || 'master' }}
          path: berlindb-core

      - name: Resolve EDD ref
        id: edd
        run: |
          if [ "${{ matrix.edd }}" = "stable" ]; then
            echo "ref=${{ needs.resolve.outputs.stable }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout EDD @ ${{ steps.edd.outputs.ref }}
        uses: actions/checkout@v6
        with:
          repository: easydigitaldownloads/easy-digital-downloads
          ref: ${{ steps.edd.outputs.ref }}
          path: edd-src

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli
          tools: composer
          coverage: none

      - name: Build EDD (composer + mozart)
        working-directory: edd-src
        run: |
          composer install --no-interaction --no-progress
          composer run mozart || true   # builds the EDD\Vendor\ libraries/

      - name: Normalize core to a master branch
        # The composer `path` repo derives its version from the checked-out branch. The
        # canary checks out an exact SHA (detached HEAD), which advertises dev-<sha> and
        # fails the `berlindb/core: dev-master` constraint. Force a local master branch at
        # whatever was checked out, so it advertises dev-master while testing that commit.
        run: git -C berlindb-core checkout -B master

      - name: Point composer at the checked-out core
        run: composer config repositories.berlindb-core path ./berlindb-core

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --no-progress

      - name: Use mysql_native_password auth
        run: mysql -h 127.0.0.1 -P 3306 -u root -proot --ssl-mode=DISABLED --get-server-public-key -e "ALTER USER 'root'@'%' IDENTIFIED WITH mysql_native_password BY 'root';"

      - name: Install subversion
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends subversion

      - name: Install WordPress test suite
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1:3306 latest

      - name: PHPUnit (capability test vs live EDD)
        env:
          EDD_PLUGIN_FILE: ${{ github.workspace }}/edd-src/easy-digital-downloads.php
        run: composer test
