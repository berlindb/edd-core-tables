name: Readiness

# Recomputes EDD's behavioral (column-flag) readiness against berlindb/core master and
# opens a PR if the badge changed. EDD's flags live in its own fork schemas, so this
# installs EDD (like the regenerate job) and scores those classes.

on:
  schedule:
    - cron: '37 6 * * *'   # daily
  workflow_dispatch:

jobs:
  readiness:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Checkout berlindb/core
        uses: actions/checkout@v6
        with:
          repository: berlindb/core
          ref: master
          path: berlindb-core

      - name: Setup PHP + WP-CLI
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mysqli
          tools: composer, wp-cli
          coverage: none

      - name: Install dependencies
        run: |
          composer config repositories.berlindb-core path ./berlindb-core
          composer update --no-interaction --prefer-dist --no-progress

      - name: Use mysql_native_password auth
        run: mysql -h 127.0.0.1 -P 3306 -u root -proot --ssl-mode=DISABLED --get-server-public-key -e "ALTER USER 'root'@'%' IDENTIFIED WITH mysql_native_password BY 'root';"

      - name: Set up a throwaway WordPress
        run: |
          wp core download --path=wp --version=latest
          wp config create --path=wp --dbname=wordpress --dbuser=root --dbpass=root --dbhost=127.0.0.1:3306
          wp core install --path=wp --url=http://localhost --title=eddct --admin_user=admin --admin_password=admin --admin_email=admin@example.com --skip-email

      - name: Install + activate latest EDD (stable)
        run: |
          wp --path=wp plugin install easy-digital-downloads --activate
          echo "EDD_VERSION=$(wp --path=wp plugin get easy-digital-downloads --field=version)" >> "$GITHUB_ENV"

      - name: Score readiness from the live EDD fork
        run: wp --path=wp eval-file bin/readiness-report.php

      - name: Open a PR if the badge changed
        uses: peter-evans/create-pull-request@v7
        with:
          branch: readiness/edd
          title: "Update EDD readiness badge"
          commit-message: "Update EDD readiness badge (EDD ${{ env.EDD_VERSION }} vs core master)"
          body: |
            Automated behavioral-readiness recomputation (EDD **${{ env.EDD_VERSION }}**
            fork flags vs berlindb/core master). If the badge changed, a flag went
            supported <-> gap - review before merging.
          add-paths: .readiness/
          delete-branch: true
